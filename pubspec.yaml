name: movie_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1
environment:
  sdk: ">=3.0.0 <4.0.0"
dependencies:
  flutter:
    sdk: flutter
  country_flags: ^3.0.0
  google_fonts: ^6.1.0
  flutter_screenutil: ^5.9.0
  shared_preferences: ^2.2.0
  cupertino_icons: ^1.0.8
  easy_localization: ^3.0.8
  flutter_svg: ^2.0.10+1
  dio: ^5.4.1
  carousel_slider: ^5.1.2
  http: ^1.6.0
  injectable: ^2.7.1+4
  get_it: ^9.2.1
  flutter_bloc: ^9.1.1
  cached_network_image: ^3.4.1
  firebase_core: ^4.4.0
  cloud_firestore: ^6.1.2
  fluttertoast: ^9.0.0
  firebase_auth: ^6.1.4
  google_sign_in: ^6.3.0
  connectivity_plus: ^7.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shimmer: ^3.0.0
  url_launcher: ^6.3.1
  webview_flutter: ^4.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_native_splash: ^2.4.7
  injectable_generator: ^2.6.2
  build_runner: ^2.4.9
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.14.4
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/splash_logo.png"
  adaptive_icon_background: "#121312"
  adaptive_icon_foreground: "assets/images/splash_logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/translations/
    - assets/images/icons/
